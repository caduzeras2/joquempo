<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/index.css">
    <title>Joquempo</title>
</head>
<body>
    <main class="conteiner"> 
        <section class="box-leaderboard">  
                <h1 class="winner">Jogador(a) 1 Venceu!</h1>
            <div class="scoreboarder-box"> 
                <span class="player-name">Jogador(a) 1</span>
                <span class="player-point">02</span>
                <strong class="separator">vs</strong>
                <span class="player-point">01</span>
                <span class="player-name">Jogador(a) 2 </span>
            </section>
            <section class="battle-field"> 
                <div class="button-wrapper"> 
                    <button class="button-move">Pedra</button>
                    <button class="button-move">Papel</button>
                    <button class="button-move">Tesoura</button>
                </div>
                <div class="battle-play"> 
                    <div class="image-field-wrapper"> 
                        <div class="image-field"></div>
                        <span class="separator-field">vs</span>
                        <div class="image-field"></div>
                    </div>
                </div>
                <div class="button-wrapper"> 
                    <button class="button-move">Pedra</button>
                    <button class="button-move">Papel</button>
                    <button class="button-move">Tesoura</button>
                </div>
            </div>
        </section>
        <div class="battle-field-conteiner"> 
            <div class="start-reset-field">
                <button class="iniciar-resetar">Iniciar</button>
                <button class="iniciar-resetar">Resetar</button>
            </div>
        </div>
    </main>
</body>
</html>
